<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password | Sales Performance</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css" />
  <script src="/web/assets/js/app-config.js"></script>
</head>
<body class="auth-shell">
  <main class="auth-card">
    <h1>Reset your password</h1>
    <p class="muted">Enter your work email and we’ll send a reset link.</p>
    <p id="flash" class="flash hidden"></p>

    <form id="forgot-form">
      <label for="email">Work email</label>
      <input id="email" name="email" type="email" required />
      <button class="primary" type="submit">Send reset link</button>
    </form>

    <p><a href="/web/index.html">Back to sign in</a></p>
  </main>
  <script type="module" src="/web/assets/js/pages/forgot-password.js"></script>
</body>
</html>

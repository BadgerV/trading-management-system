<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Targets</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css" />
  <script src="/web/assets/js/app-config.js"></script>
</head>
<body data-page="admin-targets">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main">
      <header class="header">
        <strong>Targets</strong>
        <div>
          <span id="header-user" class="muted"></span>
          <button id="signout-btn" class="secondary" type="button">Sign out</button>
        </div>
      </header>
      <main class="page">
        <p id="page-flash" class="flash hidden"></p>
        <div class="panel"><h2>Targets</h2><div id="data-table"></div></div><div class="panel"><h2>Add or update target</h2><form id="target-form"><label>Agent ID</label><input name="agent_id" required /><label>Metric</label><select name="metric"><option value="revenue">Revenue</option><option value="closed_deals">Closed deals</option><option value="activities_count">Activities count</option></select><label>Month</label><input name="period_month" type="date" required /><label>Target value</label><input name="target_value" type="number" step="0.01" min="0" required /><button class="primary" type="submit">Save target</button></form></div>
<script type="module" src="/web/assets/js/pages/admin-app.js"></script>
      </main>
    </div>
  </div>
</body>
</html>

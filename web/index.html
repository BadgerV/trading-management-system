<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in | Sales Performance</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css" />
  <script src="/web/assets/js/app-config.js"></script>
</head>
<body class="auth-shell">
  <main class="auth-card">
    <h1>Sign in to Sales Performance</h1>
    <p class="muted">Use your work account to continue.</p>
    <p id="flash" class="flash hidden"></p>

    <form id="login-form">
      <label for="email">Work email</label>
      <input id="email" name="email" type="email" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />

      <button class="primary" type="submit">Sign in</button>
    </form>

    <p><a href="/web/forgot-password.html">Forgot your password?</a></p>
  </main>
  <script type="module" src="/web/assets/js/pages/login.js"></script>
</body>
</html>
